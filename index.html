<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>💪 Paul's Body Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.5.0/Recharts.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#060d1a;font-family:'Noto Sans JP',sans-serif;color:#e2e8f0;}
  input::-webkit-inner-spin-button{-webkit-appearance:none;}
  input[type=number]{-moz-appearance:textfield;}
  ::-webkit-scrollbar{width:4px;height:4px;}
  ::-webkit-scrollbar-track{background:#0f172a;}
  ::-webkit-scrollbar-thumb{background:#334155;border-radius:2px;}
  @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .fade-in{animation:fadeIn 0.3s ease forwards;}
  .card-hover:hover{transform:translateY(-2px);transition:transform 0.15s;}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;
const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, ReferenceLine } = Recharts;

// ===== 指標定義 =====
const METRICS = [
  { key:"weight",         label:"体重",       unit:"kg",   icon:"⚖️",  goalDir:"down", goal:62,   avgLow:50,  avgHigh:75  },
  { key:"bmi",            label:"BMI",        unit:"",     icon:"📊",  goalDir:"down", goal:21,   avgLow:18.5,avgHigh:24.9},
  { key:"bodyFat",        label:"体脂肪率",   unit:"%",    icon:"🔥",  goalDir:"down", goal:19.5, avgLow:11,  avgHigh:26  },
  { key:"skeletalMuscle", label:"骨格筋",     unit:"%",    icon:"💪",  goalDir:"up",   goal:53,   avgLow:40,  avgHigh:60  },
  { key:"leanMass",       label:"除脂肪体重", unit:"kg",   icon:"🏋️", goalDir:"up",   goal:51,   avgLow:40,  avgHigh:60  },
  { key:"subcutFat",      label:"皮下脂肪",   unit:"%",    icon:"📍",  goalDir:"down", goal:16,   avgLow:5,   avgHigh:20  },
  { key:"visceralFat",    label:"内臓脂肪",   unit:"",     icon:"🫀",  goalDir:"down", goal:4,    avgLow:1,   avgHigh:14  },
  { key:"bodyWater",      label:"体水分率",   unit:"%",    icon:"💧",  goalDir:"up",   goal:58,   avgLow:50,  avgHigh:65  },
  { key:"muscleMass",     label:"筋肉量",     unit:"kg",   icon:"🦾",  goalDir:"up",   goal:49.4, avgLow:40,  avgHigh:60  },
  { key:"boneMass",       label:"骨量",       unit:"kg",   icon:"🦴",  goalDir:"up",   goal:2.7,  avgLow:2.0, avgHigh:3.5 },
  { key:"protein",        label:"タンパク質", unit:"%",    icon:"🥩",  goalDir:"up",   goal:19,   avgLow:16,  avgHigh:22  },
  { key:"bmr",            label:"基礎代謝量", unit:"kcal", icon:"⚡",  goalDir:"up",   goal:1500, avgLow:1200,avgHigh:1800},
  { key:"bodyAge",        label:"体内年齢",   unit:"歳",   icon:"🎂",  goalDir:"down", goal:57,   avgLow:40,  avgHigh:70  },
];

const INITIAL_DATA = {
  date:"2026-04-17",
  weight:63.3, bmi:21.2, bodyFat:21.1, skeletalMuscle:50.9,
  leanMass:49.94, subcutFat:19.5, visceralFat:5, bodyWater:57.0,
  muscleMass:47.48, boneMass:2.46, protein:18.0, bmr:1433, bodyAge:59,
};

const STORAGE_KEY = "paul_body_tracker_v2";

function getStatus(metric, value) {
  const { goalDir, goal, avgLow, avgHigh } = metric;
  if (goalDir === "down") {
    if (value <= goal) return "good";
    if (value <= avgHigh) return "warn";
    return "bad";
  }
  if (value >= goal) return "good";
  if (value >= avgLow) return "warn";
  return "bad";
}

const STATUS = {
  good: { bg:"#0d2e1a", border:"#22c55e", text:"#4ade80", badge:"#166534", label:"✅ 良好" },
  warn: { bg:"#2d1f00", border:"#f59e0b", text:"#fbbf24", badge:"#92400e", label:"⚠️ 注意" },
  bad:  { bg:"#2d0d0d", border:"#ef4444", text:"#f87171", badge:"#991b1b", label:"🔴 要改善" },
};

// ===== メインアプリ =====
function App() {
  const [records, setRecords] = useState([]);
  const [view, setView]       = useState("dashboard");
  const [selKey, setSelKey]   = useState("weight");
  const [form, setForm]       = useState({});
  const [saved, setSaved]     = useState(false);

  // 読み込み
  useEffect(() => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      setRecords(raw ? JSON.parse(raw) : [INITIAL_DATA]);
    } catch { setRecords([INITIAL_DATA]); }
  }, []);

  const save = useCallback((data) => {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
  }, []);

  const latest = records[records.length - 1] || INITIAL_DATA;

  const handleSubmit = () => {
    const today = new Date().toLocaleDateString("sv-SE"); // YYYY-MM-DD
    const entry = { ...latest, date: today };
    METRICS.forEach(m => {
      if (form[m.key] !== undefined && form[m.key] !== "") {
        entry[m.key] = parseFloat(form[m.key]);
      }
    });
    const updated = [...records, entry];
    setRecords(updated);
    save(updated);
    setForm({});
    setSaved(true);
    setTimeout(() => { setSaved(false); setView("dashboard"); }, 1500);
  };

  const selMetric = METRICS.find(m => m.key === selKey);
  const chartData = records.map(r => ({ date: r.date, val: r[selKey] }));

  return (
    <div style={{background:"#060d1a",minHeight:"100vh",paddingBottom:60}}>

      {/* ヘッダー */}
      <div style={{background:"linear-gradient(135deg,#0f172a,#1e1b4b)",padding:"20px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"1px solid #1e293b"}}>
        <div>
          <div style={{fontSize:20,fontWeight:900,color:"#e2e8f0",letterSpacing:"-0.5px"}}>💪 Paul's Body Tracker</div>
          <div style={{fontSize:11,color:"#64748b",marginTop:4}}>体組成管理アプリ · 最終記録: {latest.date}</div>
        </div>
        <div style={{textAlign:"center",background:"#0d2e1a",border:"2px solid #22c55e",borderRadius:12,padding:"8px 16px"}}>
          <div style={{fontSize:30,fontWeight:900,color:"#4ade80",lineHeight:1}}>{latest.bodyAge}</div>
          <div style={{fontSize:10,color:"#22c55e",marginTop:2}}>体内年齢</div>
        </div>
      </div>

      {/* ナビゲーション */}
      <div style={{display:"flex",gap:4,padding:"10px 10px",borderBottom:"1px solid #1e293b",overflowX:"auto"}}>
        {[["dashboard","📊 ダッシュボード"],["input","➕ 入力"],["chart","📈 グラフ"],["history","📅 履歴"],["plan","🎯 プラン"]].map(([v,l]) => (
          <button key={v} onClick={() => setView(v)}
            style={{background:view===v?"#1e3a5f":"#0f172a",border:view===v?"1px solid #3b82f6":"1px solid #1e293b",
              color:view===v?"#60a5fa":"#64748b",padding:"8px 12px",borderRadius:8,fontSize:12,
              cursor:"pointer",whiteSpace:"nowrap",flexShrink:0,fontFamily:"'Noto Sans JP',sans-serif",
              fontWeight:view===v?700:400}}>
            {l}
          </button>
        ))}
      </div>

      {/* ===== ダッシュボード ===== */}
      {view === "dashboard" && (
        <div className="fade-in">
          <div style={{fontSize:13,fontWeight:700,color:"#64748b",padding:"14px 16px 8px"}}>📋 最新データ ({latest.date})</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(148px,1fr))",gap:8,padding:"0 10px"}}>
            {METRICS.map(m => {
              const val = latest[m.key];
              const status = getStatus(m, val);
              const c = STATUS[status];
              const pct = m.goalDir === "down"
                ? Math.max(0, Math.min(100, ((m.avgHigh - val) / (m.avgHigh - m.avgLow)) * 100))
                : Math.max(0, Math.min(100, ((val - m.avgLow) / (m.avgHigh - m.avgLow)) * 100));
              return (
                <div key={m.key} className="card-hover"
                  onClick={() => { setSelKey(m.key); setView("chart"); }}
                  style={{background:c.bg,border:`1px solid ${c.border}`,borderRadius:12,padding:"12px 10px",cursor:"pointer"}}>
                  <div style={{fontSize:20,marginBottom:3}}>{m.icon}</div>
                  <div style={{fontSize:10,color:"#94a3b8",marginBottom:3}}>{m.label}</div>
                  <div style={{fontSize:22,fontWeight:800,color:c.text,lineHeight:1.1}}>{val}<span style={{fontSize:11,fontWeight:400}}>{m.unit}</span></div>
                  <div style={{background:c.badge,color:c.text,fontSize:9,padding:"2px 6px",borderRadius:20,display:"inline-block",marginTop:5}}>{c.label}</div>
                  <div style={{marginTop:7,background:"#1e293b",borderRadius:3,height:4,overflow:"hidden"}}>
                    <div style={{width:`${pct}%`,height:"100%",background:`linear-gradient(90deg,${c.border}88,${c.border})`,borderRadius:3}}/>
                  </div>
                  <div style={{fontSize:9,color:"#475569",marginTop:4}}>目標: {m.goal}{m.unit}</div>
                </div>
              );
            })}
          </div>
          <div style={{textAlign:"center",color:"#334155",fontSize:11,padding:"10px 0 0"}}>※ カードをタップ → グラフ表示</div>
        </div>
      )}

      {/* ===== 入力フォーム ===== */}
      {view === "input" && (
        <div className="fade-in" style={{padding:"0 10px"}}>
          <div style={{fontSize:13,fontWeight:700,color:"#64748b",padding:"14px 6px 10px"}}>➕ 新しい計測データを入力</div>
          <div style={{background:"#0f172a",border:"1px solid #1e293b",borderRadius:12,padding:14,marginBottom:12,fontSize:12,color:"#64748b"}}>
            💡 空欄の項目は前回の値が引き継がれます。変更した項目だけ入力してください。
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            {METRICS.map(m => (
              <div key={m.key} style={{background:"#0f172a",border:"1px solid #1e293b",borderRadius:10,padding:10}}>
                <label style={{fontSize:10,color:"#94a3b8",display:"block",marginBottom:5}}>{m.icon} {m.label}</label>
                <div style={{display:"flex",alignItems:"center",gap:4}}>
                  <input type="number" step="0.01" inputMode="decimal"
                    placeholder={String(latest[m.key])}
                    value={form[m.key] ?? ""}
                    onChange={e => setForm(f => ({...f, [m.key]: e.target.value}))}
                    style={{flex:1,background:"#1e293b",border:"1px solid #334155",color:"#e2e8f0",
                      borderRadius:6,padding:"7px 8px",fontSize:13,outline:"none",width:"100%",
                      fontFamily:"'Noto Sans JP',sans-serif"}}/>
                  <span style={{color:"#64748b",fontSize:10,minWidth:20}}>{m.unit}</span>
                </div>
                <div style={{fontSize:9,color:"#334155",marginTop:3}}>前回: {latest[m.key]}{m.unit}</div>
              </div>
            ))}
          </div>
          <button onClick={handleSubmit}
            style={{display:"block",margin:"16px auto 0",background:saved?"#166534":"#1d4ed8",
              border:"none",color:saved?"#4ade80":"#fff",padding:"14px 50px",borderRadius:12,
              fontSize:15,fontWeight:700,cursor:"pointer",fontFamily:"'Noto Sans JP',sans-serif",
              width:"100%",maxWidth:360,transition:"background 0.3s"}}>
            {saved ? "✅ 保存しました！" : "💾 データを保存する"}
          </button>
        </div>
      )}

      {/* ===== グラフ ===== */}
      {view === "chart" && (
        <div className="fade-in">
          <div style={{fontSize:13,fontWeight:700,color:"#64748b",padding:"14px 16px 8px"}}>📈 トレンドグラフ</div>
          {/* 指標選択 */}
          <div style={{display:"flex",flexWrap:"wrap",gap:5,padding:"0 10px 10px"}}>
            {METRICS.map(m => (
              <button key={m.key} onClick={() => setSelKey(m.key)}
                style={{background:selKey===m.key?"#1e3a5f":"#0f172a",
                  border:selKey===m.key?"1px solid #3b82f6":"1px solid #1e293b",
                  color:selKey===m.key?"#60a5fa":"#64748b",
                  padding:"5px 10px",borderRadius:20,fontSize:11,cursor:"pointer",
                  fontFamily:"'Noto Sans JP',sans-serif",fontWeight:selKey===m.key?700:400}}>
                {m.icon} {m.label}
              </button>
            ))}
          </div>

          <div style={{background:"#0f172a",margin:"0 10px",borderRadius:12,border:"1px solid #1e293b",padding:"16px 4px 12px"}}>
            <div style={{fontSize:13,fontWeight:700,color:"#94a3b8",marginBottom:8,paddingLeft:12}}>
              {selMetric?.icon} {selMetric?.label}の推移
            </div>
            {records.length < 2 ? (
              <div style={{textAlign:"center",color:"#475569",padding:"40px 20px",lineHeight:2,fontSize:12}}>
                📊 データが2件以上になるとグラフが表示されます<br/>
                「➕ 入力」から追加してください
              </div>
            ) : (
              <ResponsiveContainer width="100%" height={240}>
                <LineChart data={chartData} margin={{top:5,right:20,left:0,bottom:5}}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#1e293b"/>
                  <XAxis dataKey="date" stroke="#475569" tick={{fontSize:9,fill:"#94a3b8"}}/>
                  <YAxis stroke="#475569" tick={{fontSize:9,fill:"#94a3b8"}} domain={["auto","auto"]}/>
                  <Tooltip
                    contentStyle={{background:"#0f172a",border:"1px solid #334155",borderRadius:8,color:"#e2e8f0",fontSize:12}}
                    formatter={(v) => [`${v}${selMetric?.unit}`, selMetric?.label]}
                    labelStyle={{color:"#94a3b8"}}/>
                  {selMetric?.goal && (
                    <ReferenceLine y={selMetric.goal} stroke="#22c55e" strokeDasharray="4 4"
                      label={{value:"目標",fill:"#22c55e",fontSize:9,position:"insideTopRight"}}/>
                  )}
                  <Line type="monotone" dataKey="val" stroke="#60a5fa" strokeWidth={2.5}
                    dot={{fill:"#60a5fa",r:5,strokeWidth:2,stroke:"#0f172a"}}
                    activeDot={{r:7,fill:"#fff",stroke:"#60a5fa"}}/>
                </LineChart>
              </ResponsiveContainer>
            )}
            <div style={{display:"flex",justifyContent:"center",gap:20,fontSize:11,color:"#64748b",marginTop:8,paddingTop:8,borderTop:"1px solid #1e293b"}}>
              <span>🎯 目標: <b style={{color:"#22c55e"}}>{selMetric?.goal}{selMetric?.unit}</b></span>
              <span>📍 現在: <b style={{color:"#60a5fa"}}>{latest[selKey]}{selMetric?.unit}</b></span>
            </div>
          </div>
        </div>
      )}

      {/* ===== 履歴 ===== */}
      {view === "history" && (
        <div className="fade-in" style={{padding:"0 10px"}}>
          <div style={{fontSize:13,fontWeight:700,color:"#64748b",padding:"14px 6px 10px"}}>📅 計測履歴</div>
          {[...records].reverse().map((r, i) => (
            <div key={i} style={{background:"#0f172a",border:"1px solid #1e293b",borderRadius:10,padding:12,marginBottom:8}}>
              <div style={{fontSize:13,fontWeight:700,color:"#60a5fa",marginBottom:8,paddingBottom:6,borderBottom:"1px solid #1e293b"}}>
                📅 {r.date}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:4}}>
                {METRICS.map(m => {
                  const status = getStatus(m, r[m.key]);
                  return (
                    <div key={m.key} style={{display:"flex",justifyContent:"space-between",fontSize:11,padding:"3px 0"}}>
                      <span style={{color:"#64748b"}}>{m.icon} {m.label}</span>
                      <span style={{color:STATUS[status].text,fontWeight:700}}>{r[m.key]}{m.unit}</span>
                    </div>
                  );
                })}
              </div>
            </div>
          ))}
          <button onClick={() => {
            if (window.confirm("最初のデータを残して全て削除しますか？")) {
              const initial = [INITIAL_DATA];
              setRecords(initial);
              localStorage.setItem(STORAGE_KEY, JSON.stringify(initial));
            }
          }} style={{display:"block",margin:"8px auto",background:"transparent",border:"1px solid #7f1d1d",color:"#ef4444",padding:"8px 20px",borderRadius:8,fontSize:11,cursor:"pointer",fontFamily:"'Noto Sans JP',sans-serif"}}>
            🗑️ データをリセット
          </button>
        </div>
      )}

      {/* ===== プラン ===== */}
      {view === "plan" && (
        <div className="fade-in" style={{padding:"0 10px"}}>
          <div style={{fontSize:13,fontWeight:700,color:"#64748b",padding:"14px 6px 10px"}}>🎯 3ヶ月改善プラン</div>

          {/* 課題サマリー */}
          <div style={{background:"#0f172a",border:"1px solid #1e293b",borderRadius:12,padding:14,marginBottom:10}}>
            <div style={{fontSize:13,fontWeight:700,color:"#94a3b8",marginBottom:10}}>🔴 最優先課題</div>
            {[
              {key:"muscleMass", tip:"スクワット・腕立て伏せを2セットへ増量"},
              {key:"subcutFat",  tip:"インターバルウォーキング週3回へ"},
              {key:"boneMass",   tip:"カルシウム700mg・ビタミンD・日光浴15分"},
            ].map(({key, tip}) => {
              const m = METRICS.find(x => x.key === key);
              const val = latest[key];
              const status = getStatus(m, val);
              const pct = Math.min(100, Math.max(0, m.goalDir === "down"
                ? ((m.avgHigh - val) / (m.avgHigh - m.avgLow)) * 100
                : ((val - m.avgLow) / (m.goal - m.avgLow)) * 100));
              return (
                <div key={key} style={{marginBottom:12}}>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:4,color:"#e2e8f0"}}>
                    <span>{m.icon} {m.label}</span>
                    <span>{val}{m.unit} → <span style={{color:"#4ade80"}}>{m.goal}{m.unit}</span></span>
                  </div>
                  <div style={{background:"#1e293b",borderRadius:3,height:6,overflow:"hidden",marginBottom:3}}>
                    <div style={{width:`${pct}%`,height:"100%",background:"linear-gradient(90deg,#3b82f6,#60a5fa)",borderRadius:3}}/>
                  </div>
                  <div style={{fontSize:10,color:"#64748b"}}>💡 {tip}</div>
                </div>
              );
            })}
          </div>

          {/* 週間スケジュール */}
          <div style={{background:"#0f172a",border:"1px solid #1e293b",borderRadius:12,padding:14,marginBottom:10}}>
            <div style={{fontSize:13,fontWeight:700,color:"#94a3b8",marginBottom:10}}>🏋️ 週間運動スケジュール</div>
            {[
              ["月","🚶 速歩き20分 + スクワット×2セット","#1e3a5f","#60a5fa"],
              ["火","🏊 水泳400m（追加目標）","#0d2e1a","#4ade80"],
              ["水","🚶 速歩き20分 + 腕立て伏せ×2セット","#1e3a5f","#60a5fa"],
              ["木","🚶 ウォーキング20分（普通）","#1a1f2e","#94a3b8"],
              ["金","🚶 速歩き20分 + スクワット×2セット","#1e3a5f","#60a5fa"],
              ["土","🏊 水泳400m","#0d2e1a","#4ade80"],
              ["日","🧘 ストレッチ＋プランク30秒×3","#2d1f00","#fbbf24"],
            ].map(([day, plan, bg, col]) => (
              <div key={day} style={{display:"flex",alignItems:"flex-start",gap:10,padding:"7px 0",borderBottom:"1px solid #0f172a"}}>
                <span style={{background:bg,color:col,fontWeight:700,width:26,height:26,borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,flexShrink:0}}>
                  {day}
                </span>
                <span style={{fontSize:11,color:"#cbd5e1",lineHeight:1.6,paddingTop:4}}>{plan}</span>
              </div>
            ))}
          </div>

          {/* 栄養目標 */}
          <div style={{background:"#0f172a",border:"1px solid #1e293b",borderRadius:12,padding:14,marginBottom:10}}>
            <div style={{fontSize:13,fontWeight:700,color:"#94a3b8",marginBottom:10}}>🍽️ 1日の栄養目標</div>
            {[
              ["🥩 タンパク質","76g以上","卵2個＋鶏肉100g＋豆腐半丁"],
              ["🦴 カルシウム","700mg以上","牛乳200ml＋小魚＋ヨーグルト"],
              ["☀️ ビタミンD","日光浴15分","鮭・しらすも積極的に"],
              ["🌾 食物繊維","20g以上","玄米・野菜・海藻"],
              ["💧 水分","1.5L以上","腸内環境にも重要"],
            ].map(([name, val, tip]) => (
              <div key={name} style={{padding:"6px 0",borderBottom:"1px solid #0f172a"}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:12}}>
                  <span style={{color:"#e2e8f0",fontWeight:600}}>{name}</span>
                  <span style={{color:"#60a5fa"}}>{val}</span>
                </div>
                <div style={{fontSize:10,color:"#64748b",marginTop:2}}>{tip}</div>
              </div>
            ))}
          </div>

          {/* 3ヶ月目標 */}
          <div style={{background:"#0d2e1a",border:"1px solid #22c55e",borderRadius:12,padding:14,marginBottom:10}}>
            <div style={{fontSize:13,fontWeight:700,color:"#4ade80",marginBottom:10}}>🌟 3ヶ月後の目標</div>
            {[
              ["体脂肪率","21.1%","→","19.5%"],
              ["皮下脂肪","19.5%","→","17.0%"],
              ["筋肉量","47.48kg","→","49.0kg"],
              ["骨量","2.46kg","→","2.6kg"],
              ["体内年齢","59歳","→","57歳"],
            ].map(([label,cur,arr,goal]) => (
              <div key={label} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid #1a3a2a",fontSize:12}}>
                <span style={{color:"#94a3b8",fontWeight:600}}>{label}</span>
                <span style={{color:"#94a3b8"}}>{cur}</span>

      <div style={{textAlign:"center",color:"#1e293b",fontSize:10,padding:"20px 0 0"}}>
        Paul's Body Tracker v1.0 · データはこのブラウザに保存されます
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
